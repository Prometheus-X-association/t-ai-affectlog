<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>New Registration – AffectLog Admin</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
  .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .header { background: #1e293b; padding: 32px 40px; } .header h1 { color: #e2e8f0; font-size: 20px; margin: 0; }
  .body { padding: 32px 40px; color: #334155; font-size: 15px; line-height: 1.6; }
  .cta-button { display: inline-block; margin: 24px 0; padding: 14px 28px; background: #4f46e5; color: #fff !important; text-decoration: none; border-radius: 6px; font-weight: 600; }
  .footer { background: #f8fafc; border-top: 1px solid #e2e8f0; padding: 20px 40px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>AffectLog Admin: New Registration</h1></div>
    <div class="body">
      <p>A new registration request has been submitted and requires your review.</p>
      <p><strong>Name:</strong> {{ registrant_name }}<br>
      <strong>Email:</strong> {{ registrant_email }}</p>
      <a href="{{ admin_url }}" class="cta-button">Review in Admin Dashboard</a>
    </div>
    <div class="footer"><p>AffectLog · {{ app_base_url }}</p></div>
  </div>
</body>
</html>
